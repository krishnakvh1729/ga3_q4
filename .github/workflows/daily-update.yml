name: Daily Repository Update

on:
  schedule:
    - cron: '30 2 * * *'   # Runs every day at 2:30 AM UTC
  workflow_dispatch:         # Also allows manual triggering

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update log file - 21f2000170@ds.study.iitm.ac.in
        run: |
          echo "Daily update: $(date)" >> daily-log.txt

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "21f2000170@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated update - $(date)"
          git push
